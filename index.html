<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso al Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#090909;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
animation:move 40s linear infinite;
opacity:.35;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

.card{
position:relative;
z-index:2;
max-width:700px;
padding:30px;
}

h1{
font-size:38px;
margin-bottom:20px;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
background:#ffd54f;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.progress{
width:100%;
height:20px;
background:#333;
border-radius:20px;
overflow:hidden;
margin:30px 0;
display:none;
}

.bar{
height:100%;
width:0%;
background:#ffd54f;
transition:.25s;
}

#text{
font-size:22px;
min-height:70px;
}

.fade{
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.rose{
font-size:90px;
animation:float 2s infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<div id="screen">

<h1>⚠️ Sistema de detección</h1>

<p id="text">
Se ha detectado una persona conocida como...
<br><br>
<b style="font-size:35px;color:#ffd54f;">💛 Chichigua 💛</b>
</p>

<button onclick="start()">Iniciar análisis</button>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

</div>

</div>

<script>

const mensajes=[
"🔍 Escaneando sonrisa...",
"😊 Analizando ternura...",
"✨ Midiendo nivel de belleza...",
"🤔 Buscando defectos...",
"❌ No se encontraron defectos.",
"🎉 Análisis completado."
];

function start(){

document.querySelector("button").style.display="none";

document.getElementById("progress").style.display="block";

let i=0;
let width=0;

let barra=setInterval(()=>{

width+=17;

document.getElementById("bar").style.width=width+"%";

document.getElementById("text").innerHTML=mensajes[i];

i++;

if(i>=mensajes.length){

clearInterval(barra);

setTimeout(resultado,1000);

}

},900);

}

function resultado(){

document.getElementById("screen").innerHTML=`

<h1 class="fade">📋 Resultado</h1>

<p style="font-size:22px;line-height:45px;" class="fade">

<b>Nombre:</b> Chichigua 💛<br>

<b>Ternura:</b> 1000/10<br>

<b>Belleza:</b> Fuera de toda escala.<br>

<b>Carisma:</b> Excesivo.<br><br>

<b>Diagnóstico:</b><br>

Existe una alta probabilidad de que hagas sonreír a quien tiene la suerte de conocerte.

</p>

<button onclick="regalo()">Abrir regalo 🎁</button>

`;

}

function regalo(){

document.getElementById("screen").innerHTML=`

<div class="rose">🌹</div>

<h1>Para Chichigua</h1>

<p style="font-size:22px;line-height:40px;">

Este sistema no encontró ningún premio que estuviera a tu altura...

<br><br>

Así que decidió crear uno especialmente para vos.

<br><br>

Solo quería regalarte un momento bonito...

<br><br>

Y, con suerte,

sacarte una sonrisa. ✨💛

<br><br><br>

<small>Fin del análisis.</small>

</p>

`;

}

</script>

</body>
</html>
